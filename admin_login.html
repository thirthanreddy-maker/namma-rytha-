<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Namma Rytha — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="smooth.css" />
  <style>
    :root {
      --bg-dark: #0f172a;
      --blue-primary: #6366f1;
      --border: rgba(99, 102, 241, 0.2);
      --text-primary: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow: hidden;
    }
    .ambient-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(99, 102, 241, 0.1), transparent),
                  radial-gradient(circle at 30% 70%, rgba(56, 189, 248, 0.05), transparent);
      z-index: -1;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
    }
    .form-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
      color: #38bdf8;
    }
    .form-subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 35px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 25px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      color: #818cf8;
      margin-bottom: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      outline: none;
      transition: all 0.2s ease;
    }
    .form-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: #6366f1;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
      margin-top: 10px;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
      transition: all 0.2s ease;
    }
    .btn-submit:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }
    .status-alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 13px;
      text-align: center;
    }
    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <div class="ambient-bg"></div>
  <div class="auth-card">
    <h2 class="form-title">🔐 Admin Login</h2>
    <p class="form-subtitle">Authorized personnel only</p>
    
    <div class="status-alert status-error" id="loginError"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-input" id="adminId" placeholder="admin" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="adminPass" placeholder="••••••••">
    </div>

    <button class="btn-submit" onclick="handleAdminLogin()">Secure Login</button>
    
    <div style="text-align: center; margin-top: 25px;">
      <a href="login.html" style="color: var(--text-muted); text-decoration: none; font-size: 13px;">← Return to App</a>
    </div>
  </div>

  <script>
    function handleAdminLogin() {
      const id = document.getElementById('adminId').value;
      const pass = document.getElementById('adminPass').value;
      const err = document.getElementById('loginError');
      
      if (id === 'admin' && pass === 'admin123') {
        localStorage.setItem('nr_admin', 'true');
        window.location.href = 'admin.html';
      } else {
        err.style.display = 'block';
        err.textContent = 'Verification failed. Please check credentials.';
      }
    }
  </script>
</body>
</html>
